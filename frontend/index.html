<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentFlow Lite Workbench</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <img src="/assets/img/logo.svg" alt="AgentFlow" class="brand-logo" />
        <div>
          <p class="eyebrow">AgentFlow Lite</p>
          <h1>推理工作台</h1>
        </div>
      </div>
      <div class="header-actions">
        <span class="health-badge" id="healthBadge">
          <span class="status-dot"></span>
          正在连接
        </span>
        <a href="/docs" class="docs-link">API Docs</a>
      </div>
    </header>

    <main class="workspace">
      <section class="run-panel" aria-labelledby="newRunTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">New Run</p>
            <h2 id="newRunTitle">创建推理任务</h2>
          </div>
          <button class="ghost-button" id="exampleButton" type="button">示例</button>
        </div>

        <form id="runForm" class="run-form">
          <label class="field-block" for="queryInput">
            <span>问题</span>
            <textarea
              id="queryInput"
              name="query"
              rows="7"
              placeholder="输入你要 AgentFlow 解决的问题，例如：杭州最有名的湖叫什么？"
              required
            ></textarea>
          </label>

          <div class="form-grid two-columns">
            <label class="field-block" for="modelSelect">
              <span>主模型</span>
              <select id="modelSelect" name="model"></select>
            </label>

            <label class="field-block" for="baseUrlInput">
              <span>Base URL</span>
              <input
                id="baseUrlInput"
                name="baseUrl"
                type="url"
                placeholder="可选，本地 vLLM 或兼容服务"
              />
            </label>
          </div>

          <div class="tool-section">
            <div class="label-row">
              <span>工具</span>
              <button class="link-button" id="selectBasicTools" type="button">基础配置</button>
            </div>
            <div class="tool-grid" id="toolGrid" aria-live="polite"></div>
          </div>

          <div class="form-grid four-columns">
            <label class="field-block compact" for="maxStepsInput">
              <span>步数</span>
              <input id="maxStepsInput" name="maxSteps" type="number" min="1" max="30" value="6" />
            </label>

            <label class="field-block compact" for="maxTimeInput">
              <span>超时秒</span>
              <input id="maxTimeInput" name="maxTime" type="number" min="1" max="3600" value="300" />
            </label>

            <label class="field-block compact" for="maxTokensInput">
              <span>Token</span>
              <input id="maxTokensInput" name="maxTokens" type="number" min="256" max="32000" step="256" value="4000" />
            </label>

            <label class="field-block compact" for="temperatureInput">
              <span>温度</span>
              <input id="temperatureInput" name="temperature" type="number" min="0" max="2" step="0.1" value="0" />
            </label>
          </div>

          <div class="submit-row">
            <label class="toggle-row">
              <input id="verboseInput" name="verbose" type="checkbox" />
              <span>Verbose</span>
            </label>
            <button class="primary-button" id="runButton" type="submit">开始推理</button>
          </div>
        </form>
      </section>

      <section class="output-panel" aria-labelledby="currentRunTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Current Run</p>
            <h2 id="currentRunTitle">运行状态</h2>
          </div>
          <button class="ghost-button" id="refreshButton" type="button">刷新</button>
        </div>

        <div class="run-summary">
          <div>
            <span class="summary-label">Run ID</span>
            <strong id="activeRunId">尚未创建</strong>
          </div>
          <span class="status-pill is-idle" id="activeStatus">idle</span>
        </div>

        <div class="result-box">
          <div class="result-header">
            <span>最终答案</span>
            <button class="link-button" id="copyResultButton" type="button">复制</button>
          </div>
          <pre id="resultOutput">提交任务后，结果会显示在这里。</pre>
        </div>

        <div class="timeline-block">
          <div class="label-row">
            <span>事件流</span>
            <span class="muted" id="eventCount">0 events</span>
          </div>
          <ol class="timeline" id="timeline"></ol>
        </div>
      </section>

      <section class="history-panel" aria-labelledby="historyTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">History</p>
            <h2 id="historyTitle">最近任务</h2>
          </div>
          <button class="ghost-button" id="historyRefreshButton" type="button">更新列表</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" defer></script>
  </body>
</html>
